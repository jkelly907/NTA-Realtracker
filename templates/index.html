<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTA Live Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #080C14;
    --panel: #0D1421;
    --border: #1A2740;
    --green: #00E676;
    --amber: #FFB300;
    --red: #FF3D3D;
    --blue: #40C4FF;
    --text: #C8D8E8;
    --muted: #4A6080;
    --accent: #169B62;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0; z-index: 1000; position: relative;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo h1 { font-family: 'Chakra Petch', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.08em; color: #fff; }
  .logo span { font-size: 11px; color: var(--muted); font-weight: 300; display: block; letter-spacing: 0.15em; text-transform: uppercase; }
  .refresh-info { font-size: 11px; color: var(--muted); text-align: right; }
  .refresh-info strong { color: var(--text); display: block; font-size: 13px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; display: inline-block; margin-right: 6px; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  .stats-bar {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 48px; display: flex; align-items: center; gap: 24px; flex-shrink: 0;
  }
  .stat { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-value { font-family: 'Chakra Petch', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.blue  { color: var(--blue); }
  .stat-divider { width: 1px; height: 28px; background: var(--border); }
  .pie-wrap { display: flex; align-items: center; gap: 12px; margin-left: auto; padding-left: 24px; border-left: 1px solid var(--border); }
  .pie-legend { display: flex; flex-direction: column; gap: 4px; }
  .pie-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .pie-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 360px; flex-shrink: 0; background: var(--panel);
    border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-family: 'Chakra Petch', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .filter-tabs { display: flex; gap: 4px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 4px 12px; border-radius: 4px; font-size: 11px; font-family: 'Chakra Petch', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .15s; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:hover:not(.active) { border-color: var(--muted); color: var(--text); }
  .search-box { padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .search-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color .15s; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }
  .vehicle-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .vehicle-list::-webkit-scrollbar { width: 4px; }
  .vehicle-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .vehicle-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  .vehicle-item:hover { background: rgba(255,255,255,.03); }
  .vehicle-item.selected { background: rgba(22,155,98,.12); border-left: 3px solid var(--accent); }
  .vehicle-top { display: flex; align-items: center; justify-content: space-between; }
  .vehicle-route { font-family: 'Chakra Petch', sans-serif; font-size: 14px; font-weight: 700; color: #fff; }
  .delay-badge { font-size: 11px; padding: 2px 8px; border-radius: 3px; font-weight: 500; font-family: 'Chakra Petch', sans-serif; }
  .delay-badge.on-time  { background: rgba(0,230,118,.15); color: var(--green); }
  .delay-badge.late     { background: rgba(255,179,0,.15);  color: var(--amber); }
  .delay-badge.very-late{ background: rgba(255,61,61,.15);  color: var(--red); }
  .delay-badge.early    { background: rgba(64,196,255,.15); color: var(--blue); }
  .vehicle-meta { font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; margin-top: 2px; }
  .no-results { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 12px; display: none; }

  #map { flex: 1; position: relative; z-index: 1; }
  .leaflet-container { background: #080C14; }
  .leaflet-tile { filter: brightness(.5) saturate(.4) hue-rotate(180deg); }

  .detail-panel {
    position: absolute; bottom: 20px; right: 20px; width: 320px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    z-index: 900; display: none; box-shadow: 0 8px 32px rgba(0,0,0,.6); overflow: hidden;
  }
  .detail-panel.visible { display: block; }
  .detail-header { padding: 14px 16px; background: rgba(22,155,98,.1); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .detail-route { font-family: 'Chakra Petch', sans-serif; font-size: 20px; font-weight: 700; color: #fff; }
  .detail-operator { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }
  .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
  .close-btn:hover { color: var(--text); }
  .detail-body { padding: 14px 16px; max-height: 380px; overflow-y: auto; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .detail-field label { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); display: block; margin-bottom: 3px; }
  .detail-field value { font-size: 14px; font-weight: 500; color: #fff; display: block; font-family: 'Chakra Petch', sans-serif; }
  .stops-section h4 { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 8px; }
  .stop-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
  .stop-row:last-child { border-bottom: none; }
  .stop-name { color: var(--text); }
  .stop-delay { font-family: 'Chakra Petch', sans-serif; font-weight: 600; font-size: 12px; }
  .stop-delay.on-time   { color: var(--green); }
  .stop-delay.late      { color: var(--amber); }
  .stop-delay.very-late { color: var(--red); }
  .stop-delay.early     { color: var(--blue); }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 16px; transition: opacity .4s; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text { font-family: 'Chakra Petch', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: .1em; color: #fff; }
  .loading-sub { font-size: 12px; color: var(--muted); letter-spacing: .15em; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .vehicle-tooltip {
    background: #0D1421 !important; border: 1px solid #1A2740 !important;
    color: #C8D8E8 !important; font-family: 'DM Mono', monospace !important;
    font-size: 12px !important; border-radius: 6px !important;
    padding: 8px 12px !important; box-shadow: 0 4px 16px rgba(0,0,0,.6) !important;
  }
  .vehicle-tooltip::before { display: none !important; }

  /* ── MOBILE ─────────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    /* Compact header */
    header { padding: 0 14px; height: 48px; }
    .logo h1 { font-size: 14px; }
    .logo span { display: none; }
    .logo-icon { width: 28px; height: 28px; font-size: 15px; }
    #data-age { display: none; }

    /* Stats bar — horizontal scroll, no pie chart */
    .stats-bar { padding: 0 14px; gap: 16px; overflow-x: auto; height: 40px; }
    .stat-value { font-size: 16px; }
    .pie-wrap { display: none; }

    /* Map fills entire remaining space */
    .main { position: relative; }
    #map { position: absolute; inset: 0; z-index: 1; }

    /* Sidebar becomes a bottom sheet */
    .sidebar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      height: 52px;           /* collapsed: just the handle bar */
      max-height: 70vh;
      border-right: none;
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      z-index: 800;
      transition: height 0.3s ease;
      overflow: hidden;
    }
    .sidebar.open { height: 70vh; }

    /* Drag handle at top of bottom sheet */
    .sidebar-header {
      justify-content: center;
      cursor: pointer;
      padding: 10px 20px 8px;
      position: relative;
    }
    .sidebar-header::before {
      content: '';
      display: block;
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      position: absolute;
      top: 8px; left: 50%; transform: translateX(-50%);
    }
    .sidebar-title { margin-top: 6px; }

    /* Filter tabs — scrollable */
    .filter-tabs { overflow-x: auto; flex-wrap: nowrap; }
    .tab { white-space: nowrap; flex-shrink: 0; }

    /* Detail panel — full width bottom sheet */
    .detail-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      border-radius: 16px 16px 0 0;
      border-left: none; border-right: none; border-bottom: none;
      max-height: 60vh;
      z-index: 1000;
    }
    .detail-body { max-height: calc(60vh - 60px); }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">NTA LIVE TRACKER</div>
  <div class="loading-sub">FETCHING REAL-TIME DATA...</div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">🚌</div>
    <div>
      <h1>NTA LIVE TRACKER</h1>
      <span>National Transport Authority — Ireland</span>
    </div>
  </div>
  <div class="refresh-info">
    <strong><span class="live-dot"></span><span id="live-label">LIVE</span></strong>
    Refreshes in <span id="countdown">30</span>s &nbsp;
    <span id="data-age" style="font-size:10px;color:var(--muted)"></span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-value" id="stat-total">–</div><span>Vehicles</span></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-value green" id="stat-ontime">–</div><span>On Time</span></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-value amber" id="stat-delayed">–</div><span>Delayed</span></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-value blue" id="stat-early">–</div><span>Early</span></div>
  <div class="pie-wrap">
    <canvas id="pie-chart" width="44" height="44"></canvas>
    <div class="pie-legend">
      <div class="pie-legend-item"><div class="pie-legend-dot" style="background:#00E676"></div><span id="pie-ontime-pct">–</span> On Time</div>
      <div class="pie-legend-item"><div class="pie-legend-dot" style="background:#FFB300"></div><span id="pie-delayed-pct">–</span> Delayed</div>
      <div class="pie-legend-item"><div class="pie-legend-dot" style="background:#40C4FF"></div><span id="pie-early-pct">–</span> Early</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header"><div class="sidebar-title">Vehicles</div></div>
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all',this)">All</button>
      <button class="tab" onclick="setFilter('delayed',this)">Delayed</button>
      <button class="tab" onclick="setFilter('early',this)">Early</button>
      <button class="tab" onclick="setFilter('ontime',this)">On Time</button>
    </div>
    <div class="search-box">
      <input type="text" id="search" placeholder="Search route, destination, operator..." oninput="filterVehicles()">
    </div>
    <div class="vehicle-list" id="vehicle-list">
      <div class="no-results" id="no-results">No vehicles match your filter</div>
    </div>
  </div>

  <div id="map"></div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div>
        <div class="detail-route" id="d-route">–</div>
        <div class="detail-operator" id="d-operator">–</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-grid">
        <div class="detail-field"><label>Vehicle ID</label><value id="d-vid">–</value></div>
        <div class="detail-field"><label>Reg / Label</label><value id="d-reg">–</value></div>
        <div class="detail-field"><label>Speed</label><value id="d-speed">–</value></div>
        <div class="detail-field"><label>Status</label><value id="d-status">–</value></div>
        <div class="detail-field" style="grid-column:1/-1"><label>Trip ID</label><value id="d-trip" style="font-size:10px">–</value></div>
        <div class="detail-field"><label>Delay</label><value id="d-delay">–</value></div>
        <div class="detail-field"><label>Last GPS Update</label><value id="d-last-update">–</value></div>
        <div class="detail-field" style="grid-column:1/-1"><label>Next Stop</label><value id="d-next-stop">–</value></div>
      </div>
      <div class="stops-section">
        <h4>Upcoming Stops</h4>
        <div id="stops-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
var map = L.map('map', { center: [53.35, -7.5], zoom: 7 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 18
}).addTo(map);

var allVehicles   = [];
var markers       = {};
var selectedId    = null;
var currentFilter = 'all';
var countdown     = 30;
var countdownInt  = null;
var posHistory    = {};
var routeLayer    = null;
var stopDots      = [];

// ── Helpers ────────────────────────────────────────────────────────────────
function delayClass(d) {
  if (d < -60) return 'early';
  if (d <  60) return 'on-time';
  if (d < 300) return 'late';
  return 'very-late';
}

function delayLabel(d) {
  var abs  = Math.abs(d);
  var mins = Math.floor(abs / 60);
  var secs = abs % 60;
  if (abs < 30)  return 'ON TIME';
  if (d < 0)     return mins + 'm ' + secs + 's EARLY';
  return '+' + mins + 'm ' + secs + 's';
}

function markerColor(d) {
  if (d < -60) return '#40C4FF';
  if (d <  60) return '#00E676';
  if (d < 300) return '#FFB300';
  return '#FF3D3D';
}

function calcBearing(lat1, lon1, lat2, lon2) {
  var toR = function(d) { return d * Math.PI / 180; };
  var dL  = toR(lon2 - lon1);
  var y   = Math.sin(dL) * Math.cos(toR(lat2));
  var x   = Math.cos(toR(lat1)) * Math.sin(toR(lat2)) - Math.sin(toR(lat1)) * Math.cos(toR(lat2)) * Math.cos(dL);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ── Pie chart ─────────────────────────────────────────────────────────────
function drawPie(onTime, delayed, early) {
  var canvas = document.getElementById('pie-chart');
  var ctx = canvas.getContext('2d');
  var cx = 22, cy = 22, r = 20;
  var total = onTime + delayed + early || 1;
  ctx.clearRect(0, 0, 44, 44);
  var slices = [
    { v: onTime,  c: '#00E676' },
    { v: delayed, c: '#FFB300' },
    { v: early,   c: '#40C4FF' }
  ];
  var angle = -Math.PI / 2;
  slices.forEach(function(s) {
    if (!s.v) return;
    var a = (s.v / total) * Math.PI * 2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + a);
    ctx.closePath(); ctx.fillStyle = s.c; ctx.fill();
    angle += a;
  });
  ctx.beginPath(); ctx.arc(cx, cy, 11, 0, Math.PI * 2);
  ctx.fillStyle = '#080C14'; ctx.fill();
}

function updateStats(stats) {
  document.getElementById('stat-total').textContent   = stats.total;
  document.getElementById('stat-ontime').textContent  = stats.on_time;
  document.getElementById('stat-delayed').textContent = stats.delayed;
  document.getElementById('stat-early').textContent   = stats.early;
  var t = stats.total || 1;
  var pct = function(n) { return Math.round(n / t * 100) + '%'; };
  document.getElementById('pie-ontime-pct').textContent  = pct(stats.on_time);
  document.getElementById('pie-delayed-pct').textContent = pct(stats.delayed);
  document.getElementById('pie-early-pct').textContent   = pct(stats.early);
  drawPie(stats.on_time, stats.delayed, stats.early);
}

// ── Marker icons ───────────────────────────────────────────────────────────
function makeIcon(v) {
  var color   = markerColor(v.delay);
  var name    = v.route_name || (v.route_id ? v.route_id.split('_').pop() : '?');
  var bearing = v.computedBearing;
  var fs      = name.length <= 2 ? 11 : name.length <= 3 ? 9 : 8;
  var w       = Math.max(36, name.length * 8 + 16);
  var arrow   = (bearing !== null && bearing !== undefined)
    ? '<div style="font-size:10px;line-height:1;color:' + color + ';transform:rotate(' + bearing + 'deg);margin-bottom:1px">▲</div>'
    : '';
  return L.divIcon({
    className: '',
    html: '<div style="display:flex;flex-direction:column;align-items:center">'
        + arrow
        + '<div style="background:' + color + ';color:#000;font-family:Chakra Petch,sans-serif;font-weight:700;font-size:' + fs + 'px;padding:2px 5px;border-radius:4px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.6);line-height:1.3;min-width:24px;text-align:center">' + name + '</div>'
        + '</div>',
    iconSize:   [w, bearing !== null ? 42 : 28],
    iconAnchor: [w / 2, bearing !== null ? 21 : 14]
  });
}

// ── Vehicle list ───────────────────────────────────────────────────────────
function getFiltered() {
  var q = document.getElementById('search').value.toLowerCase();
  return allVehicles.filter(function(v) {
    var matchFilter =
      currentFilter === 'all' ||
      (currentFilter === 'delayed' && v.delay >= 60) ||
      (currentFilter === 'early'   && v.delay < -60) ||
      (currentFilter === 'ontime'  && v.delay >= -60 && v.delay < 60);
    if (!matchFilter) return false;
    if (!q) return true;
    return (v.route_name    && v.route_name.toLowerCase().includes(q))   ||
           (v.destination   && v.destination.toLowerCase().includes(q))  ||
           (v.operator      && v.operator.toLowerCase().includes(q))     ||
           (v.vehicle_label && v.vehicle_label.toLowerCase().includes(q))||
           (v.license_plate && v.license_plate.toLowerCase().includes(q))||
           (v.next_stop && v.next_stop.stop_name && v.next_stop.stop_name.toLowerCase().includes(q));
  });
}

function renderList(vehicles) {
  var list = document.getElementById('vehicle-list');
  var noRes = document.getElementById('no-results');
  Array.from(list.children).forEach(function(c) { if (c.id !== 'no-results') c.remove(); });
  if (!vehicles.length) { noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  vehicles.forEach(function(v) {
    var dc = delayClass(v.delay);
    var dl = delayLabel(v.delay);
    var item = document.createElement('div');
    item.className = 'vehicle-item' + (v.id === selectedId ? ' selected' : '');
    item.dataset.id = v.id;
    item.innerHTML =
      '<div class="vehicle-top">'
      + '<div class="vehicle-route">' + (v.route_name || v.route_id) + '</div>'
      + '<div class="delay-badge ' + dc + '">' + dl + '</div>'
      + '</div>'
      + (v.destination ? '<div style="font-size:12px;color:#fff;margin-bottom:2px">→ ' + v.destination + '</div>' : '')
      + (v.next_stop   ? '<div style="font-size:11px;color:var(--muted);margin-bottom:2px">⬡ Next: ' + v.next_stop.stop_name + '</div>' : '')
      + '<div class="vehicle-meta">'
      + '<span>🚌 ' + (v.operator || '') + '</span>'
      + (v.vehicle_label ? '<span>🔑 ' + v.vehicle_label + '</span>' : '')
      + (v.speed ? '<span>⚡ ' + v.speed + ' km/h</span>' : '')
      + '</div>';
    item.onclick = function() { selectVehicle(v.id); };
    list.appendChild(item);
  });
}

function filterVehicles() { renderList(getFiltered()); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  filterVehicles();
}

// ── Route drawing ──────────────────────────────────────────────────────────
function clearRoute() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  stopDots.forEach(function(d) { map.removeLayer(d); });
  stopDots = [];
}

function drawRoute(tripId, color, liveStopIds) {
  clearRoute();
  fetch('/api/trip-route/' + encodeURIComponent(tripId))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.polyline || data.polyline.length < 2) return;
      routeLayer = L.polyline(data.polyline, { color: color, weight: 3, opacity: 0.7 }).addTo(map);
      var upcoming = new Set(liveStopIds);
      data.stops.forEach(function(stop, i) {
        var isNext     = liveStopIds.length > 0 && stop.stop_id === liveStopIds[0];
        var isUpcoming = upcoming.has(stop.stop_id);
        var dot = L.circleMarker([stop.lat, stop.lon], {
          radius:      isNext ? 7 : 4,
          fillColor:   isNext ? '#fff' : isUpcoming ? color : '#4A6080',
          color:       isNext ? color : 'transparent',
          weight:      isNext ? 2 : 0,
          fillOpacity: isUpcoming ? 0.9 : 0.35
        }).addTo(map)
          .bindTooltip('<strong>' + stop.stop_name + '</strong>' + (stop.arrival_time ? '<br>' + stop.arrival_time : ''), { className: 'vehicle-tooltip' });
        stopDots.push(dot);
      });
    })
    .catch(function(e) { console.error('Route fetch failed:', e); });
}

// ── Vehicle selection ──────────────────────────────────────────────────────
function selectVehicle(id) {
  selectedId = id;
  var v = allVehicles.find(function(x) { return x.id === id; });
  if (!v) return;

  map.setView([v.lat, v.lon], Math.max(map.getZoom(), 13));
  drawRoute(v.trip_id, markerColor(v.delay), (v.stops || []).map(function(s) { return s.stop_id; }));

  document.querySelectorAll('.vehicle-item').forEach(function(el) {
    el.classList.toggle('selected', el.dataset.id === id);
  });

  document.getElementById('d-route').textContent    = v.route_name || v.route_id;
  document.getElementById('d-operator').textContent = v.destination ? v.operator + '  →  ' + v.destination : (v.operator || '');
  document.getElementById('d-vid').textContent      = v.vehicle_id || '–';
  document.getElementById('d-reg').textContent      = v.license_plate || v.vehicle_label || '–';
  document.getElementById('d-speed').textContent    = v.speed ? v.speed + ' km/h' : '–';
  document.getElementById('d-trip').textContent     = v.trip_id || '–';

  var statusEl = document.getElementById('d-status');
  statusEl.textContent  = delayLabel(v.delay);
  statusEl.style.color  = markerColor(v.delay);

  var delayEl = document.getElementById('d-delay');
  var dm = Math.round(v.delay / 60);
  delayEl.textContent = v.delay === 0 ? '0s' : (v.delay > 0 ? '+' : '') + dm + 'm';
  delayEl.style.color = markerColor(v.delay);

  document.getElementById('d-next-stop').textContent = v.next_stop ? v.next_stop.stop_name : '–';

  var updEl = document.getElementById('d-last-update');
  if (v.timestamp) {
    var ts   = new Date(v.timestamp * 1000);
    var age  = Math.floor((Date.now() - ts) / 1000);
    var tStr = ts.toLocaleTimeString('en-IE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    var aStr = age < 60 ? age + 's ago' : Math.floor(age/60) + 'm ' + (age%60) + 's ago';
    updEl.textContent  = tStr + ' (' + aStr + ')';
    updEl.style.color  = age > 300 ? 'var(--red)' : age > 120 ? 'var(--amber)' : 'var(--green)';
  } else {
    updEl.textContent = '–';
    updEl.style.color = '';
  }

  var stopsList = document.getElementById('stops-list');
  stopsList.innerHTML = '';
  var upcoming = (v.stops || []).slice(1, 7);
  if (!upcoming.length) {
    stopsList.innerHTML = '<div style="color:var(--muted);font-size:11px">No upcoming stop data</div>';
  } else {
    upcoming.forEach(function(s) {
      var dc = delayClass(s.delay);
      var row = document.createElement('div');
      row.className = 'stop-row';
      row.innerHTML = '<span class="stop-name">' + (s.stop_name || s.stop_id) + '</span>'
                    + '<span class="stop-delay ' + dc + '">' + delayLabel(s.delay) + '</span>';
      stopsList.appendChild(row);
    });
  }

  document.getElementById('detail-panel').classList.add('visible');
  // On mobile, collapse the bottom sheet when detail opens
  if (window.innerWidth <= 768) {
    document.querySelector('.sidebar').classList.remove('open');
  }
}

function closeDetail() {
  selectedId = null;
  clearRoute();
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelectorAll('.vehicle-item').forEach(function(el) { el.classList.remove('selected'); });
}

// ── Markers ────────────────────────────────────────────────────────────────
function updateMarkers(vehicles) {
  var ids = new Set(vehicles.map(function(v) { return v.id; }));
  Object.keys(markers).forEach(function(id) {
    if (!ids.has(id)) { map.removeLayer(markers[id]); delete markers[id]; }
  });
  vehicles.forEach(function(v) {
    var prev = posHistory[v.id];
    var bearing = null;
    if (prev) {
      var dlat = Math.abs(v.lat - prev.lat), dlon = Math.abs(v.lon - prev.lon);
      if (dlat > 0.0001 || dlon > 0.0001) bearing = calcBearing(prev.lat, prev.lon, v.lat, v.lon);
    }
    posHistory[v.id] = { lat: v.lat, lon: v.lon };
    v.computedBearing = bearing;

    var icon    = makeIcon(v);
    var tooltip = '<strong>' + (v.route_name || v.route_id) + '</strong>'
                + (v.destination ? ' → ' + v.destination : '') + '<br>'
                + (v.operator || '') + '<br>' + delayLabel(v.delay);
    var vid = v.id;
    if (markers[vid]) {
      markers[vid].setLatLng([v.lat, v.lon]).setIcon(icon)
        .unbindTooltip().bindTooltip(tooltip, { className: 'vehicle-tooltip' })
        .off('click').on('click', function() { selectVehicle(vid); });
    } else {
      markers[vid] = L.marker([v.lat, v.lon], { icon: icon })
        .addTo(map)
        .bindTooltip(tooltip, { className: 'vehicle-tooltip' })
        .on('click', function() { selectVehicle(vid); });
    }
  });
}

// ── Data fetch ─────────────────────────────────────────────────────────────
function fetchData() {
  var ctrl    = new AbortController();
  var timeout = setTimeout(function() { ctrl.abort(); }, 15000);
  fetch('/api/data', { signal: ctrl.signal })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      clearTimeout(timeout);
      allVehicles = data.vehicles;
      updateStats(data.stats);
      updateMarkers(allVehicles);
      filterVehicles();
      if (selectedId) {
        var v = allVehicles.find(function(x) { return x.id === selectedId; });
        if (v) selectVehicle(selectedId);
      }
      var liveLabel = document.getElementById('live-label');
      var stale = (data.vehicles_age > 60 || data.updates_age > 120);
      liveLabel.textContent = stale ? 'CACHED' : 'LIVE';
      document.querySelector('.live-dot').style.background = stale ? '#FFB300' : '#00E676';
      document.getElementById('data-age').textContent =
        'Pos ' + (data.vehicles_age || 0) + 's · Delays ' + (data.updates_age || 0) + 's';
    })
    .catch(function(e) { clearTimeout(timeout); console.error('Fetch error:', e); })
    .finally(function() { document.getElementById('loading').classList.add('hidden'); });
}

function startCountdown() {
  countdown = 30;
  clearInterval(countdownInt);
  countdownInt = setInterval(function() {
    countdown--;
    document.getElementById('countdown').textContent = countdown;
    if (countdown <= 0) { fetchData(); countdown = 30; }
  }, 1000);
}

// Hard fallback — hide loading after 12s no matter what
setTimeout(function() {
  document.getElementById('loading').classList.add('hidden');
}, 12000);

fetchData();
startCountdown();

// Mobile bottom sheet toggle
var sidebarEl = document.querySelector('.sidebar');
var sidebarHeader = document.querySelector('.sidebar-header');
if (sidebarHeader) {
  sidebarHeader.addEventListener('click', function() {
    if (window.innerWidth <= 768) {
      sidebarEl.classList.toggle('open');
    }
  });
}
</script>
